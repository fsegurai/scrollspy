name: Bug report
description: Report a reproducible bug in @fsegurai/scrollspy.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please use this form for reproducible issues in the `packages/scrollspy` package, the `demo/` app, the docs, or the build/test workflow.
        If you're not sure whether something is a bug or a support question, start a discussion first.
  - type: dropdown
    id: scope
    attributes:
      label: Where does the bug happen?
      description: Pick the area that best matches the problem.
      options:
        - package API
        - demo app
        - documentation
        - build / CI
        - tests
        - other
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What happened?
      description: Describe the bug and include the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Describe the correct behavior or outcome.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run `bun install`
        2. Start the demo with `bun run dev`
        3. Open the page in Chrome and scroll to the second heading
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Failing command or workflow
      description: Include the command, browser action, or CI job where the bug appears.
      placeholder: "Examples: `bun run test`, `bun run dev`, browser scroll interaction, build output"
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Console output, stack trace, or screenshot
      description: Add any logs, error messages, screenshots, or other useful evidence.
      placeholder: Paste the output here or attach a screenshot.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: ScrollSpy version
      description: Which version of `@fsegurai/scrollspy` are you using?
      placeholder: 2.0.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.14.0"
    validations:
      required: true
  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: "e.g. 1.3.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04, macOS 15, Windows 11"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Only fill this in for demo or browser-specific bugs.
      placeholder: "e.g. Chrome 136"
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: |
        - Include screenshots, code snippets, or links to a minimal reproduction.
        - Mention whether this is isolated to `demo/` or the `packages/scrollspy` package.
    validations:
      required: false
